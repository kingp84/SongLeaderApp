<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Leader Menu</title>

<!-- PWA: App Manifest -->
<link rel="manifest" href="manifest.json">
<script src="app.js"></script>

<!-- PWA: iPhone Home Screen Icon -->
<link rel="apple-touch-icon" href="icons/ic_launcher.png">

<!-- PWA: Theme Color (status bar color) -->
<meta name="theme-color" content="#1e1e1e">

<style>
    body {
        background-color: #1e1e1e;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 26px;
        font-weight: bold;
    }

    .menu-button {
        display: block;
        width: 100%;
        background-color: #2ecc71;
        color: #1e1e1e;
        text-align: center;
        padding: 18px;
        margin: 15px 0;
        font-size: 20px;
        font-weight: bold;
        border: none;
        border-radius: 0;
        cursor: pointer;
    }

    .menu-button:active {
        background-color: #29b765;
    }

    .footer {
        margin-top: 40px;
        text-align: center;
        font-size: 12px;
        color: #888;
    }
</style>

</head>
<body>

<h1>Song Leader Menu</h1>

<button class="menu-button" onclick="location.href='sunday_morning.html'">
    Sunday Morning
</button>

<button class="menu-button" onclick="location.href='sunday_evening.html'">
    Sunday Evening
</button>

<button class="menu-button" onclick="location.href='wednesday_evening.html'">
    Wednesday Evening
</button>

<div class="footer">
    Song Leader App • Dark Mode • Android & iPhone Optimized
</div>

<!-- PWA: Service Worker Registration -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
